services:
  database:
    image: postgres:15-alpine
    container_name: oncomente-db
    environment:
      POSTGRES_USER: postgres
      # Senha simples só para desenvolvimento local (alinha com apps/backend/.env.example)
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oncomente
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
